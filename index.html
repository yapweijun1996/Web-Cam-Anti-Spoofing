<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>MiniFAS Anti-Spoof Test (no LLM)</title>
<link rel="icon" href="data:,">
<style>
  html, body {
    margin: 0;
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #111;
    color: #eee;
  }

  #stage {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
  }

  #video, #overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  /* Explicit stacking instead of relying on DOM order: <video> elements can
     paint via a separate compositor layer in some browsers and have been
     unreliable about respecting implicit paint order in this project.
     Force the canvas to its own higher layer so drawings are never hidden
     behind the video feed. */
  #video { z-index: 1; }
  #overlay { z-index: 2; }

  #panel {
    position: fixed;
    top: 12px;
    left: 12px;
    z-index: 100;
    background: rgba(0,0,0,0.75);
    padding: 12px 16px;
    border-radius: 8px;
    max-width: 340px;
  }

  #panel h1 { font-size: 15px; margin: 0 0 8px; }
  #panel p { font-size: 12px; line-height: 1.4; color: #bbb; margin: 4px 0; }

  button {
    font-size: 13px;
    padding: 6px 10px;
    margin: 4px 4px 0 0;
    border: none;
    border-radius: 6px;
    background: #2d6cdf;
    color: white;
    cursor: pointer;
  }
  button:hover { background: #4a83ee; }
  button.secondary { background: #555; }
  button.secondary:hover { background: #777; }

  #status { font-size: 12px; margin-top: 8px; color: #8f8; white-space: pre-line; }

  #stats {
    position: fixed;
    top: 12px;
    right: 12px;
    z-index: 100;
    background: rgba(0,0,0,0.75);
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 13px;
    min-width: 200px;
  }
  #stats div { margin: 2px 0; }
  #stats .real { color: #3fbf5f; }
  #stats .spoof { color: #ff5050; }

  label { font-size: 12px; color: #ccc; display: block; margin-top: 8px; }
  input[type=range] { width: 100%; }
</style>
</head>
<body>

<div id="stage">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="overlay"></canvas>
</div>

<div id="panel">
  <h1>MiniFAS Anti-Spoof Test (纯 JS，不用 LLM)</h1>
  <p>face-api.js TinyFaceDetector 找脸 → MiniFASNetV2-SE (ONNX, onnxruntime-web) 判断真人/伪造。
     全程本地跑，不联网、不用大模型。</p>
  <button id="startBtn">Start</button>
  <button id="resetStatsBtn" class="secondary">Reset stats</button>
  <label>Real/Spoof 概率阈值: <span id="thresholdVal">0.50</span></label>
  <input id="thresholdSlider" type="range" min="0.05" max="0.95" step="0.01" value="0.5">
  <div id="status">Status: not started</div>
</div>

<div id="stats">
  <div><b>实时判定</b></div>
  <div id="liveVerdict">-</div>
  <div id="deviceHint" style="color:#fbbf24"></div>
  <div style="margin-top:8px"><b>累计统计</b></div>
  <div class="real">Real: <span id="realCount">0</span></div>
  <div class="spoof">Spoof: <span id="spoofCount">0</span></div>
  <div>Spoof rate: <span id="spoofRate">0%</span></div>
  <div style="margin-top:8px"><b>COCO-SSD raw (debug)</b></div>
  <div id="debugObjects" style="font-size:11px;color:#999;white-space:pre-line">-</div>
  <div style="margin-top:8px"><b>Motion parallax layer (debug, not wired into verdict yet)</b></div>
  <div id="parallaxDebug" style="font-size:11px;color:#999;white-space:pre-line">-</div>
</div>

<script>
  // face-api.js bundles its own copy of TF.js core; loading the official
  // tf.min.js separately for COCO-SSD makes both copies register the same
  // WebGL kernels at script-load time, spamming the console with harmless
  // "already registered" warnings (first registration wins; nothing breaks).
  // Must run BEFORE the library scripts below, since that's when they fire.
  (function () {
    const nativeWarn = console.warn.bind(console);
    console.warn = (...args) => {
      if (typeof args[0] === "string" && args[0].includes("is already registered")) return;
      nativeWarn(...args);
    };
  })();
</script>
<script src="lib/face-api.js"></script>
<script src="lib/ort.min.js"></script>
<script src="lib/tf.min.js"></script>
<script src="lib/coco-ssd.min.js"></script>
<script type="module" src="parallax.js"></script>
<script src="app.js"></script>
</body>
</html>
